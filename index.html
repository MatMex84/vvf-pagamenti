<style>
/* ═══ TOKEN SISTEMA ═══ */
:root {
  --bg:    #F2F2F7;
  --bg2:   #FFFFFF;
  --lbl:   #000000;
  --lbl2:  rgba(60,60,67,.60);
  --lbl3:  rgba(60,60,67,.30);
  --sep:   rgba(60,60,67,.22);
  --sep-o: #C6C6C8;
  --fill:  rgba(120,120,128,.12);
  --fill2: rgba(120,120,128,.16);
  --blue:  #007AFF;
  --green: #34C759;
  --orange:#FF9500;
  --vvf:   #C8102E;
  --vvf-bg:rgba(200,16,46,.10);
  --sft:   env(safe-area-inset-top,0px);
  --sfb:   env(safe-area-inset-bottom,0px);
}
/* ═══ DARK MODE ═══ */
[data-dark] {
  --bg:    #000000;
  --bg2:   #1C1C1E;
  --lbl:   #FFFFFF;
  --lbl2:  rgba(235,235,245,.60);
  --lbl3:  rgba(235,235,245,.25);
  --sep:   rgba(84,84,88,.65);
  --sep-o: #38383A;
  --fill:  rgba(118,118,128,.36);
  --fill2: rgba(118,118,128,.32);
  --vvf:   #FF453A;
  --vvf-bg:rgba(255,69,58,.15);
  --green: #30D158;
  --blue:  #0A84FF;
  --orange:#FF9F0A;
}
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:-apple-system,"SF Pro Text","Helvetica Neue",system-ui,sans-serif;color:var(--lbl);-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
body{padding-bottom:calc(50px + var(--sfb) + 80px)}

/* ═══ NAV BAR ═══ */
.nav{position:sticky;top:var(--sft);z-index:100;background:rgba(242,242,247,.92);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-bottom:.33px solid var(--sep);transition:background .3s}
[data-dark] .nav{background:rgba(28,28,30,.92)}
.nav-inner{display:flex;align-items:center;height:44px;padding:0 16px;gap:10px}
.nav-flame{width:28px;height:28px;border-radius:7px;background:var(--vvf);display:grid;place-items:center;font-size:15px;flex:none;line-height:1;transition:background .3s}
.nav-title{font-size:17px;font-weight:600;letter-spacing:-.3px;flex:1}
.nav-saved{font-size:12px;font-weight:600;color:var(--green);opacity:0;transition:opacity .3s;white-space:nowrap}
.nav-saved.show{opacity:1}
.theme-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;line-height:1}

/* ═══ MAIN ═══ */
main{max-width:430px;margin:0 auto;padding:0 16px 12px}

/* ═══ LARGE TITLE ═══ */
.large-title{padding:8px 0 4px;font-size:34px;font-weight:700;letter-spacing:-.4px;line-height:1.15}

/* ═══ SECTION ═══ */
.sh{font-size:13px;color:var(--lbl2);padding:0 4px;margin:8px 0 5px}
.sf{font-size:13px;color:var(--lbl2);padding:6px 4px 0;line-height:1.45}

/* ═══ iOS GROUPED FORM ═══ */
.ios-g{background:var(--bg2);border-radius:12px;overflow:hidden;margin-bottom:0;transition:background .3s}
.ios-r{display:flex;align-items:center;min-height:48px;padding:0 16px;gap:12px;border-bottom:.33px solid var(--sep);position:relative}
.ios-r:last-child{border-bottom:none}
.ios-r label{font-size:16px;flex:none;min-width:86px;color:var(--lbl);padding:12px 0}
.ios-r input,.ios-r select{flex:1;border:none;outline:none;font:inherit;font-size:16px;color:var(--blue);background:transparent;text-align:right;-webkit-appearance:none;appearance:none;min-width:0;padding:12px 0}
.ios-r input[type="number"]{color:var(--lbl)}
.ios-r input.calc{color:var(--green);font-weight:600}
.ios-r input::placeholder{color:var(--lbl3);text-align:right}
.ios-r textarea{flex:1;border:none;outline:none;font:inherit;font-size:15px;background:transparent;resize:none;min-height:76px;padding:12px 0;color:var(--lbl);line-height:1.45}
.ios-r textarea::placeholder{color:var(--lbl3)}
.ios-r.ta{align-items:flex-start}
.time-note{font-size:11px;color:var(--green);padding:0 16px 8px;display:none}
.time-note.show{display:block}

/* ═══ SEGMENTED ═══ */
.seg{display:flex;background:rgba(118,118,128,.24);border-radius:9px;padding:2px;margin-bottom:14px}
.seg button{flex:1;border:none;background:transparent;font:inherit;font-size:13px;font-weight:600;color:var(--lbl2);padding:6px 4px;border-radius:7px;cursor:pointer;transition:.15s;white-space:nowrap}
.seg button.on{background:var(--bg2);color:var(--lbl);box-shadow:0 1px 2px rgba(0,0,0,.15)}

/* ═══ MONTH HEADER + DELETE ═══ */
.month-hd{display:flex;align-items:center;gap:8px;padding:16px 4px 8px}
.month-hd-lbl{font-size:13px;color:var(--lbl2);text-transform:uppercase;letter-spacing:.05em;font-weight:400;flex:1}
.del-month-btn{background:none;border:none;font-size:11px;font-weight:600;color:var(--vvf);padding:4px 10px;border-radius:7px;background:var(--vvf-bg);cursor:pointer;letter-spacing:.01em;white-space:nowrap}

/* ═══ SERVICE CARD ═══ */
.svc{background:var(--bg2);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 0 rgba(0,0,0,.04);transition:background .3s}
.svc-body{display:flex;align-items:flex-start;padding:14px 16px;gap:13px}
.svc-stripe{width:4px;height:100%;border-radius:3px;flex:none;align-self:stretch;min-height:48px}
.svc-stripe.wait{background:var(--vvf)}
.svc-stripe.ok{background:var(--green)}
.svc-stripe.old{background:var(--orange)}
.svc-info{flex:1;min-width:0}
.svc-title{font-size:16px;font-weight:600;letter-spacing:-.2px;color:var(--lbl)}
.svc-sub{font-size:13px;color:var(--lbl2);margin-top:2px}
.svc-time{font-size:12px;color:var(--blue);margin-top:2px;font-weight:500}
.svc-notes{font-size:13px;color:var(--lbl2);margin-top:4px;line-height:1.35}
.svc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.tag{font-size:11.5px;font-weight:600;padding:2px 8px;border-radius:5px}
.tag.wait{background:var(--vvf-bg);color:var(--vvf)}
.tag.ok{background:rgba(52,199,89,.12);color:#1A8C3C}
[data-dark] .tag.ok{background:rgba(48,209,88,.15);color:#30D158}
.tag.warn{background:rgba(255,149,0,.12);color:#C05000}
[data-dark] .tag.warn{color:#FF9F0A}
.tag.comp{background:var(--fill);color:var(--lbl2)}
.svc-qty{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-1px;line-height:1;flex:none;text-align:right}
.svc-qty small{font-size:12px;font-weight:500;color:var(--lbl2);display:block;text-align:right;letter-spacing:0}
.svc-acts{display:flex;border-top:.33px solid var(--sep)}
.svc-acts button{flex:1;border:none;background:transparent;font:inherit;font-size:14px;font-weight:600;padding:12px 4px;cursor:pointer;color:var(--blue);transition:background .1s}
.svc-acts button:active{background:var(--fill)}
.svc-acts button+button{border-left:.33px solid var(--sep)}
.svc-acts button.red{color:var(--vvf)}
.svc-acts button.grn{color:var(--green)}

/* ═══ BUTTONS ═══ */
.btn-prim{width:100%;background:var(--vvf);color:#fff;border:none;border-radius:12px;font:inherit;font-size:17px;font-weight:600;padding:15px;cursor:pointer;letter-spacing:-.2px;transition:.12s}
.btn-prim:active{opacity:.82;transform:scale(.98)}
.btn-ghost{background:var(--bg2);color:var(--lbl);border:none;border-radius:10px;font:inherit;font-size:14px;font-weight:600;padding:11px 16px;cursor:pointer;transition:background .3s}
.btn-sm{background:var(--fill);color:var(--blue);border:none;border-radius:8px;font:inherit;font-size:13px;font-weight:600;padding:7px 14px;cursor:pointer}
.btn-sm.red{color:var(--vvf)}
.btn-sm.grn{color:var(--green)}

/* ═══ WIDGETS ═══ */
.widgets{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px}
.widget{background:var(--bg2);border-radius:16px;padding:16px 16px 14px;display:flex;flex-direction:column;gap:2px;transition:background .3s}
.wico{font-size:20px;margin-bottom:4px}
.wnum{font-size:40px;font-weight:800;letter-spacing:-2px;font-variant-numeric:tabular-nums;line-height:1}
.wnum.red{color:var(--vvf)}
.wlbl{font-size:12px;color:var(--lbl2);font-weight:500;margin-top:2px}

/* ═══ INSOLUTO TABLE ═══ */
.ios-tbl{background:var(--bg2);border-radius:12px;overflow:hidden;transition:background .3s}
.ios-th{display:flex;padding:9px 16px 7px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--lbl2);border-bottom:.33px solid var(--sep)}
.ios-td{display:flex;align-items:center;padding:11px 16px;border-bottom:.33px solid var(--sep);font-size:15px;gap:8px}
.ios-td:last-child{border-bottom:none}
.ios-td .main{flex:1;font-weight:400;display:flex;align-items:center;gap:6px}
.ios-td .r{font-variant-numeric:tabular-nums;font-weight:600;color:var(--lbl2);min-width:44px;text-align:right}
.ios-td .r.red{color:var(--vvf)}

/* ═══ CEDOLINO BUILDER ═══ */
.bldr-wrap{background:var(--bg2);border-radius:12px;overflow:hidden;transition:background .3s}
.bldr-line{border-bottom:.33px solid var(--sep)}
.bldr-line:last-child{border-bottom:none}
.bldr-grid{display:grid;grid-template-columns:1fr 1fr;padding:12px 16px;gap:10px 14px;align-items:start}
.bldr-field label{font-size:11px;color:var(--lbl2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}
.bldr-field input,.bldr-field select{border:none;outline:none;font:inherit;font-size:15px;width:100%;background:transparent;-webkit-appearance:none;color:var(--lbl);border-bottom:.5px solid var(--sep-o);padding-bottom:3px}
.bldr-del{padding:4px 16px 12px}
.cedo{background:var(--bg2);border-radius:12px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 0 rgba(0,0,0,.04);transition:background .3s}
.cedo-hd{display:flex;align-items:center;padding:14px 16px;border-bottom:.33px solid var(--sep);gap:10px}
.cedo-hd strong{font-size:16px;font-weight:600;flex:1}
.cedo-row{display:flex;align-items:center;padding:10px 16px;border-bottom:.33px solid var(--sep);font-size:14px;gap:8px;flex-wrap:wrap}
.cedo-row:last-child{border-bottom:none}
.cedo-row .k{font-weight:600;flex:1}
.cedo-row .d{color:var(--lbl2);font-size:12px}

/* ═══ TAB BAR ═══ */
nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(249,249,249,.94);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-top:.33px solid var(--sep-o);padding-bottom:var(--sfb);transition:background .3s}
.tabbar-inner{display:flex;width:100%}
[data-dark] nav{background:rgba(28,28,30,.94)}
nav button{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px 4px;font:inherit}
.tab-ic{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:21px;line-height:1}
.tab-lbl{font-size:10px;font-weight:500;color:var(--lbl2);letter-spacing:.02em}
nav button.on .tab-lbl{color:var(--vvf);font-weight:700}
.topbar{display:flex;gap:8px;margin-bottom:10px}
.topbar button{flex:1}

/* ═══ TOAST ═══ */
.toast{position:fixed;left:50%;z-index:300;bottom:calc(62px + var(--sfb) + 10px);transform:translateX(-50%) translateY(6px);background:rgba(44,44,48,.94);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);color:#fff;padding:11px 20px;border-radius:999px;font-size:14px;font-weight:600;letter-spacing:-.1px;opacity:0;transition:.2s cubic-bezier(.25,.46,.45,.94);pointer-events:none;white-space:nowrap;max-width:85%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══ EMPTY STATE ═══ */
.empty{text-align:center;padding:60px 20px 40px}
.empty .ico{font-size:56px;margin-bottom:14px}
.empty h3{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:8px}
.empty p{font-size:15px;color:var(--lbl2);margin-bottom:24px;line-height:1.5}

/* utils */
.tnum{font-variant-numeric:tabular-nums}
.gap{margin-bottom:20px}
.gap-sm{margin-bottom:10px}
.mt{margin-top:20px}
.mt-sm{margin-top:10px}

/* ═══ PRIVACY (occhio) ═══ */
.eye-mini{background:none;border:none;font-size:13px;cursor:pointer;padding:2px;line-height:1;flex:none}
.ios-td.muted-row{opacity:.42}
.ios-td.muted-row .main,.ios-td.muted-row .r{color:var(--lbl2)}
.bldr-note{padding:0 16px 10px;font-size:12px;color:var(--lbl2);margin-top:-6px}

/* ═══ GRID SERVIZI/CEDOLINI (desktop) ═══ */
.svc-grid{display:grid;grid-template-columns:1fr;gap:10px}
.cedo-grid{display:grid;grid-template-columns:1fr;gap:12px}

/* ═══ LAYOUT RESPONSIVE DESKTOP ═══ */
@media (min-width:640px){
  main{max-width:600px}
}
@media (min-width:860px){
  main{max-width:820px}
  .nav-inner{max-width:820px;margin:0 auto}
  .tabbar-inner{max-width:820px;margin:0 auto}
  .widgets{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
  .svc-grid{grid-template-columns:repeat(2,1fr)}
  .cedo-grid{grid-template-columns:repeat(2,1fr)}
}
@media (min-width:1180px){
  main{max-width:1140px}
  .nav-inner{max-width:1140px}
  .tabbar-inner{max-width:1140px}
  .svc-grid{grid-template-columns:repeat(3,1fr)}
}
</style>

/* ═══ DARK MODE ═══ */
function applyTheme(manual){
  const h = new Date().getHours();
  const isNight = h>=20 || h<7;
  const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  let dark;
  if(manual==='dark') dark=true;
  else if(manual==='light') dark=false;
  else dark = sysDark || isNight;
  if(dark) document.documentElement.setAttribute('data-dark','1');
  else document.documentElement.removeAttribute('data-dark');
  document.getElementById('theme-toggle').textContent = dark ? '☀️' : '🌙';
  try{ localStorage.setItem('vvf_theme', dark?'dark':'light'); }catch(e){}
}
let themeManual = null;
try{ themeManual = localStorage.getItem('vvf_theme'); }catch(e){}
applyTheme(themeManual);
setInterval(()=>applyTheme(null), 60000); // ricontrolla ogni minuto
document.getElementById('theme-toggle').onclick = ()=>{
  const isDark = document.documentElement.hasAttribute('data-dark') && document.documentElement.getAttribute('data-dark')==='1';
  applyTheme(isDark?'light':'dark');
};
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', ()=>applyTheme(null));

/* ═══ PERSISTENCE ═══ */
async function load(){
  if(!hasStore){ state=JSON.parse(JSON.stringify(INITIAL_DATA)); return; }
  try{
    const r=await window.storage.get(KEY);
    if(r&&r.value){ state=JSON.parse(r.value); }
    else{ state=JSON.parse(JSON.stringify(INITIAL_DATA)); await window.storage.set(KEY,JSON.stringify(state)); }
  }catch(e){ state=JSON.parse(JSON.stringify(INITIAL_DATA)); }
}
let _st;
async function save(){
  if(hasStore){ try{ await window.storage.set(KEY,JSON.stringify(state)); flashSaved(); }catch(e){ toast('Salvataggio non riuscito'); }}
  else flashSaved();
}
function flashSaved(){ const s=document.getElementById('saved'); s.classList.add('show'); clearTimeout(_st); _st=setTimeout(()=>s.classList.remove('show'),1400); }

/* ═══ UTILS ═══ */
const uid      = ()=>crypto.randomUUID?crypto.randomUUID():'t'+Date.now()+Math.random().toString(16).slice(2);
const todayISO = ()=>new Date().toISOString().slice(0,10);
const monthOf  = iso=>iso?iso.slice(0,7):'';
function monthLabel(ym,short=false){ if(!ym)return'—'; const[y,m]=ym.split('-'); return(short?MESI_S:MESI)[(+m)-1]+' '+y; }
function dateLabel(iso){ if(!iso)return''; const[y,m,d]=iso.split('-'); return d+'/'+m+'/'+y.slice(2); }
function monthsAgo(ym){ if(!ym)return 0; const[y,m]=ym.split('-').map(Number); const n=new Date(); return(n.getFullYear()-y)*12+(n.getMonth()+1-m); }
function esc(s){ return(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2000); }
function fmt(n){ return(Math.round(n*100)/100).toLocaleString('it-IT',{maximumFractionDigits:2}); }
function calcHours(from,to){
  if(!from||!to) return null;
  const[fh,fm]=from.split(':').map(Number);
  const[th,tm]=to.split(':').map(Number);
  let diff=(th*60+tm)-(fh*60+fm);
  if(diff<0) diff+=24*60;
  return Math.round(diff/60*100)/100;
}

/* ═══ RENDER ═══ */
function render(){
  document.querySelectorAll('#tab-bar button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  document.getElementById('nav-title').textContent=tabTitles[tab]||'';
  const app=document.getElementById('app');
  if(tab==='inserisci') app.innerHTML=viewInserisci();
  else if(tab==='servizi')   app.innerHTML=viewServizi();
  else if(tab==='cedolini')  app.innerHTML=viewCedolini();
  else                       app.innerHTML=viewInsoluto();
  wire();
  window.scrollTo(0,0);
}
window.go = t=>{ tab=t; render(); };

function viewServizi(){
  const list=[...state.services].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const f=filter;
  const cnt=st=>list.filter(s=>s.status===st).length;
  const seg=`<div class="seg">
    <button class="${f==='attesa'?'on':''}" data-filter="attesa">In attesa (${cnt('attesa')})</button>
    <button class="${f==='pagato'?'on':''}" data-filter="pagato">Pagati (${cnt('pagato')})</button>
    <button class="${f==='tutti' ?'on':''}" data-filter="tutti">Tutti (${list.length})</button>
  </div>`;
  const shown=list.filter(s=>f==='tutti'?true:f==='attesa'?s.status==='attesa':s.status==='pagato');
  if(!list.length)  return seg+emptyState('Nessun servizio','Aggiungi il primo dalla tab Inserisci.','inserisci');
  if(!shown.length) return seg+emptyState('Niente qui','Nessun servizio in questo filtro.');
  let html=seg, lastG=null, open=false;
  shown.forEach(s=>{
    const g=monthOf(s.date);
    if(g!==lastG){
      if(open) html+='</div>';
      const cnt=shown.filter(x=>monthOf(x.date)===g).length;
      html+=`<div class="month-hd">
        <span class="month-hd-lbl">${monthLabel(g,true)}</span>
        <button class="del-month-btn" data-month="${g}">🗑 Elimina mese (${cnt})</button>
      </div>`;
      html+='<div class="svc-grid">';
      open=true;
      lastG=g;
    }
    html+=svcCard(s);
  });
  if(open) html+='</div>';
  return html;
}

function svcCard(s){
  const paid=s.status==='pagato';
  const age=monthsAgo(s.competence);
  const old=!paid&&age>=9;
  const dotCls=paid?'ok':old?'old':'wait';
  const typeName=s.type==='Altro'?(s.other||'Altro'):s.type;
  const qtyNum=s.cat==='conteggio'
    ?`<div class="svc-qty">${s.qty||0}<small>×</small></div>`
    :`<div class="svc-qty">${fmt(s.hours||0)}<small>ore</small></div>`;
  const tagStatus=paid
    ?`<span class="tag ok">Pagato${s.paidIn?' · '+monthLabel(s.paidIn,true):''}</span>`
    :`<span class="tag wait">In attesa</span>`;
  const timeRow=s.startTime&&s.endTime?`<div class="svc-time">⏱ ${s.startTime} → ${s.endTime}</div>`:'';
  const payBtn=paid
    ?`<button class="t-wait" data-id="${s.id}">↩︎ In attesa</button>`
    :`<button class="grn t-pay" data-id="${s.id}">✓ Pagato</button>`;
  return `<div class="svc">
    <div class="svc-body">
      <div class="svc-stripe ${dotCls}"></div>
      <div class="svc-info">
        <div class="svc-title">${esc(typeName)}</div>
        <div class="svc-sub">${dateLabel(s.date)}${s.location?' · '+esc(s.location):''}</div>
        ${timeRow}
        <div class="svc-tags">
          ${tagStatus}
          <span class="tag comp">comp. ${monthLabel(s.competence,true)}</span>
          ${old?`<span class="tag warn">${age} mesi</span>`:''}
        </div>
        ${s.notes?`<div class="svc-notes">${esc(s.notes)}</div>`:''}
      </div>
      ${qtyNum}
    </div>
    <div class="svc-acts">
      ${payBtn}
      <button class="t-edit" data-id="${s.id}">Modifica</button>
      <button class="red t-del" data-id="${s.id}">Elimina</button>
    </div>
  </div>`;
}

  let html=`

    <div class="ios-r"><label>Mese</label><input type="month" id="c_month" value="${draftMonth||monthOf(todayISO())}"></div>
  </div>
  <div class="sh mt-sm">Voci pagate</div>
  <div class="bldr-wrap gap-sm" id="c_lines_wrap">

  <button class="btn-prim" id="c_save" style="margin-bottom:28px">Salva e riscontra cedolino</button>`;

  if(list.length){
    html+=`<div class="sh">Cedolini registrati</div><div class="cedo-grid">`;
    list.forEach(c=>{

        ${l.amount!=null?`<span class="d tnum" style="margin-left:auto">€ ${(+l.amount).toFixed(2)}</span>`:''}

/* ══════════════════════════════════════════
   IMPORT PDF CEDOLINO
══════════════════════════════════════════ */
async function pdfToText(data){
  const doc=await pdfjsLib.getDocument({data}).promise;
  let out='';
  for(let p=1;p<=doc.numPages;p++){
    const page=await doc.getPage(p);
    const content=await page.getTextContent();
    const lines={};
    content.items.forEach(it=>{
      const y=Math.round(it.transform[5]);
      (lines[y]=lines[y]||[]).push(it);
    });
    const ys=Object.keys(lines).map(Number).sort((a,b)=>b-a);
    ys.forEach(y=>{
      const row=lines[y].slice().sort((a,b)=>a.transform[4]-b.transform[4]);
      let lineStr='', prevEndX=null;
      row.forEach(it=>{
        const x=it.transform[4], h=it.height||it.transform[0]||8;
        if(prevEndX!==null && (x-prevEndX)>Math.max(2,h*0.3)) lineStr+=' ';
        lineStr+=it.str; prevEndX=x+(it.width||0);
      });
      out+=lineStr+'\n';
    });
  }
  return out;
}
function parseCedolinoText(text){
  const toNum=s=>parseFloat(s.replace(/\./g,'').replace(',','.'));
  const rataM=text.match(/RATA\s*:?\s*([A-Za-zÀ-ù]+)\s+(\d{4})/i);
  let month=null;
  if(rataM){ const mi=MESI.findIndex(m=>m.toLowerCase()===rataM[1].toLowerCase()); if(mi>=0) month=rataM[2]+'-'+String(mi+1).padStart(2,'0'); }
  const reStr=/^([A-Z0-9]+\/[A-Z0-9]+)\s+STRAORDINARIO\s*([A-ZÀ-Ù. ]*?)\s*-\s*Qta\.\s*([\d.,]+)\s*-\s*Imp\.\s*([\d.,]+)\s*-\s*Rif\.\s*(\d{2})\/(\d{4})\s+([\d.,]+)\s*$/i;
  const reInd=/^([A-Z0-9]+\/[A-Z0-9]+)\s+(.+?)\s*-\s*dal\s*(\d{2})\/(\d{4})\s*al\s*(\d{2})\/(\d{4})\s+([\d.,]+)\s*$/i;
  const lines=[];
  text.split('\n').forEach(raw=>{
    const line=raw.trim(); if(!line) return;
    let m=line.match(reStr);
    if(m){
      const label=(m[2]||'').toUpperCase();
      const kind=/NOTT|FEST/.test(label)?'Straordinario nott./festivo':'Straordinario diurno';
      lines.push({kind,desc:null,hours:toNum(m[3]),ref:m[6]+'-'+m[5],amount:toNum(m[7])});
      return;
    }
    m=line.match(reInd);
    if(m) lines.push({kind:'Indennità',desc:m[2].trim(),hours:null,ref:m[4]+'-'+m[3],amount:toNum(m[7])});
  });
  return {month,lines};
}
async function handlePdfUpload(e){
  const file=e.target.files[0]; if(!file) return;
  if(!window.pdfjsLib){ toast('Libreria PDF non ancora pronta: attendi un istante e riprova'); e.target.value=''; return; }
  try{ pdfjsLib.GlobalWorkerOptions.workerSrc = pdfjsLib.GlobalWorkerOptions.workerSrc || 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js'; }catch(_){}
  toast('Lettura del PDF…');
  try{
    const buf=await file.arrayBuffer();
    const text=await pdfToText(new Uint8Array(buf));
    const {month,lines}=parseCedolinoText(text);
    if(!lines.length){ toast('Nessuna voce riconosciuta nel PDF'); e.target.value=''; return; }
    draftMonth=month;
    draftLines=lines.map(l=>({kind:l.kind,desc:l.desc,hours:l.hours??'',ref:l.ref||'',amount:l.amount??''}));
    toast(`${lines.length} voci estratte dal PDF`);
    render();
  }catch(err){ console.error(err); toast('Errore nella lettura del PDF'); }
  e.target.value='';
}

function reconcileCedolino(id){
  const c=state.cedolini.find(x=>x.id===id); if(!c) return;
  let marked=0;
  (c.lines||[]).forEach(l=>{
    if(!l.ref) return;
    let budget=l.hours==null?Infinity:+l.hours;
    const cand=state.services
      .filter(s=>s.status==='attesa'&&s.cat==='ore'&&s.competence===l.ref)
      .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    for(const s of cand){ if(budget<=0)break; s.status='pagato'; s.paidIn=c.month; marked++; budget-=(s.hours||0); }
  });
  save(); toast(marked?`${marked} servizi segnati come pagati`:'Nessun servizio in attesa per queste competenze'); render();
}

function viewInsoluto(){
  const pend=state.services.filter(s=>s.status==='attesa');
  if(!state.services.length) return emptyState('Nessun dato ancora','Inizia da "Inserisci" a registrare i tuoi servizi.','inserisci');

  const byComp={};
  pend.forEach(s=>{ const k=s.competence||'—'; byComp[k]=byComp[k]||{ore:0,cnt:0,n:0};
    if(s.cat==='ore') byComp[k].ore+=(+s.hours||0); else byComp[k].cnt+=(+s.qty||0); byComp[k].n++; });

  // ← ORDINATO DAL PIÙ RECENTE
  const comps=Object.keys(byComp).sort().reverse();

  // Totali: escludono i mesi disattivati con l'occhio
  let oreTot=0, cntTot=0;
  comps.forEach(k=>{ if(!hiddenMonths.includes(k)){ oreTot+=byComp[k].ore; cntTot+=byComp[k].cnt; } });

  const tableRows=comps.map(k=>{
    const v=byComp[k], age=monthsAgo(k), old=age>=9, hidden=hiddenMonths.includes(k);
    return `<div class="ios-td${hidden?' muted-row':''}">
      <button class="eye-mini" data-month="${esc(k)}" title="${hidden?'Includi nel totale':'Escludi dal totale'}">${hidden?'🙈':'👁️'}</button>
      <div class="main">${monthLabel(k,true)}${old&&!hidden?`<span class="tag warn" style="font-size:10px;padding:1px 6px">${age}m</span>`:''}</div>
      <div class="r${old&&!hidden?' red':''}">${v.ore?fmt(v.ore)+' h':'—'}</div>
      <div class="r" style="min-width:34px">${v.cnt||'—'}</div>
      <div class="r" style="min-width:28px;color:var(--lbl3)">${v.n}</div>
    </div>`;
  }).join('');

  const oldest=[...pend].filter(s=>!hiddenMonths.includes(s.competence||'—')).sort((a,b)=>(a.competence||'').localeCompare(b.competence||'')).filter(s=>monthsAgo(s.competence)>=9).slice(0,6);

  return `
<div style="padding:0 0 8px">
  <div class="large-title">Insoluto</div>
  <div class="topbar mt">
    <button class="btn-ghost" id="exp_json" style="font-size:13px">⬇︎ Backup</button>
    <button class="btn-ghost" id="imp_json" style="font-size:13px">⬆︎ Ripristina</button>
    <button class="btn-ghost" id="exp_csv" style="font-size:13px">CSV</button>
  </div>
  <div class="sh">${pend.length} voci in attesa · ${state.services.length} totali</div>
  <div class="widgets gap">
    <div class="widget"><div class="wico">⏱</div><div class="wnum red">${fmt(oreTot)}</div><div class="wlbl">ore da pagare</div></div>
    <div class="widget"><div class="wico">🍽</div><div class="wnum red">${cntTot}</div><div class="wlbl">pasti / pernotti</div></div>
  </div>
  <div class="sh">Per mese di competenza — dal più recente · tocca 👁️ per escludere un mese dal totale</div>
  <div class="ios-tbl gap">
    <div class="ios-th"><div style="width:20px"></div><div style="flex:1">Competenza</div><div style="min-width:52px;text-align:right">Ore</div><div style="min-width:34px;text-align:right">Cnt</div><div style="min-width:28px;text-align:right;color:var(--lbl3)">N</div></div>
    ${tableRows||'<div class="ios-td"><div class="main" style="color:var(--green)">Tutto pagato 🎉</div></div>'}
  </div>
  ${oldest.length?`<div class="sh">⏳ In ritardo da oltre 9 mesi</div><div class="svc-grid">`+oldest.map(svcCard).join('')+`</div>`:''}
  <input type="file" id="imp_file" accept="application/json" style="display:none">
</div>`;
}

function emptyState(title,sub,goTab){
  return `<div class="empty"><div class="ico">📭</div><h3>${title}</h3><p>${sub}</p>${goTab?`<button class="btn-prim" style="max-width:220px;margin:0 auto" onclick="go('${goTab}')">Vai a Inserisci</button>`:''}</div>`;
}

/* ═══ WIRING ═══ */
function wire(){
  if(tab==='inserisci') wireInserisci();
  if(tab==='servizi')   wireServizi();
  if(tab==='cedolini')  wireCedolini();
  if(tab==='insoluto')  wireInsoluto();
}

function wireInserisci(){
  const type=document.getElementById('f_type');
  const fQty=document.getElementById('f_qty');
  const fFrom=document.getElementById('f_from');
  const fTo=document.getElementById('f_to');
  const note=document.getElementById('f_time_note');

  function syncType(){
    const t=type.value, isCnt=catOf(t)==='conteggio';
    document.getElementById('f_other_wrap').style.display=t==='Altro'?'flex':'none';
    document.getElementById('f_qty_label').textContent=isCnt?'Quantità':'Ore';
    document.getElementById('f_time_wrap').style.display=isCnt?'none':'flex';
    document.getElementById('f_time_wrap2').style.display=isCnt?'none':'flex';
    fQty.step=isCnt?'1':'0.25'; fQty.placeholder='0';
  }
  function syncTime(){
    const h=calcHours(fFrom.value,fTo.value);
    if(h!==null){
      fQty.value=h;
      fQty.classList.add('calc');
      const crossMidnight=(fTo.value<fFrom.value);
      note.textContent=`${fFrom.value} → ${fTo.value}${crossMidnight?' (+1 giorno)':''} = ${fmt(h)} ore`;
      note.classList.add('show');
    } else {
      fQty.classList.remove('calc');
      note.classList.remove('show');
    }
  }
  type.addEventListener('change',syncType); syncType();
  fFrom.addEventListener('change',syncTime);
  fTo.addEventListener('change',syncTime);
  fQty.addEventListener('input',()=>{ fQty.classList.remove('calc'); note.classList.remove('show'); });

  document.getElementById('f_save').addEventListener('click',()=>{
    const t=type.value, cat=catOf(t);
    const qty=parseFloat(fQty.value);
    if(isNaN(qty)||qty<0){ toast(cat==='conteggio'?'Inserisci la quantità':'Inserisci le ore'); return; }
    const date=document.getElementById('f_date').value||todayISO();
    const s={
      id:uid(), date, type:t, other:document.getElementById('f_other').value.trim(), cat,
      hours:cat==='ore'?qty:null, qty:cat==='conteggio'?qty:null,
      startTime:fFrom.value||null, endTime:fTo.value||null,
      location:document.getElementById('f_loc').value.trim(),
      competence:monthOf(date), status:'attesa', paidIn:null,
      notes:document.getElementById('f_notes').value.trim()
    };
    state.services.push(s); save(); toast('Servizio salvato'); tab='servizi'; filter='attesa'; render();
  });
}

function wireServizi(){
  document.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{ filter=b.dataset.filter; render(); });
  document.querySelectorAll('.t-pay').forEach( b=>b.onclick=()=>setStatus(b.dataset.id,'pagato'));
  document.querySelectorAll('.t-wait').forEach(b=>b.onclick=()=>setStatus(b.dataset.id,'attesa'));
  document.querySelectorAll('.t-del').forEach( b=>b.onclick=()=>{ state.services=state.services.filter(s=>s.id!==b.dataset.id); save(); toast('Eliminato'); render(); });
  document.querySelectorAll('.t-edit').forEach(b=>b.onclick=()=>editService(b.dataset.id));
  document.querySelectorAll('.del-month-btn').forEach(b=>b.onclick=()=>{
    const month=b.dataset.month;
    const toDelete=state.services.filter(s=>monthOf(s.date)===month&&(filter==='tutti'||s.status===filter));
    if(!toDelete.length){ toast('Nessun servizio da eliminare'); return; }
    if(confirm(`Eliminare ${toDelete.length} servizi di ${monthLabel(month,true)}?`)){
      const ids=new Set(toDelete.map(s=>s.id));
      state.services=state.services.filter(s=>!ids.has(s.id));
      save(); toast(`${ids.size} servizi eliminati`); render();
    }
  });
}
function setStatus(id,st){ const s=state.services.find(x=>x.id===id); if(!s)return; s.status=st; if(st==='attesa')s.paidIn=null; save(); render(); }
function editService(id){
  const s=state.services.find(x=>x.id===id); if(!s) return;
  const lbl=s.cat==='conteggio'?'quantità':'ore';
  const nv=prompt(`${s.type} del ${dateLabel(s.date)} — modifica ${lbl}:`,s.cat==='conteggio'?s.qty:s.hours);
  if(nv===null) return;
  const n=parseFloat(nv); if(isNaN(n)){ toast('Valore non valido'); return; }
  if(s.cat==='conteggio') s.qty=n; else s.hours=n;
  const nl=prompt('Località / riferimento:',s.location||''); if(nl!==null) s.location=nl.trim();
  save(); toast('Aggiornato'); render();
}

function wireCedolini(){
  const pdfBtn=document.getElementById('c_pdf_btn'), pdfFile=document.getElementById('c_pdf_file');
  if(pdfBtn&&pdfFile){ pdfBtn.onclick=()=>pdfFile.click(); pdfFile.onchange=handlePdfUpload; }
  document.getElementById('c_addline').onclick=()=>{ readDraft(); draftLines.push({kind:'Straordinario diurno',hours:'',ref:'',amount:''}); render(); };
  document.querySelectorAll('.dl-x').forEach(b=>b.onclick=()=>{ readDraft(); draftLines.splice(+b.dataset.i,1); render(); });
  document.getElementById('c_save').onclick=()=>{
    readDraft();
    const month=document.getElementById('c_month').value;
    if(!month){ toast('Indica il mese del cedolino'); return; }
    const lines=draftLines.filter(l=>l.hours!==''||l.ref!==''||l.amount!=='')
      .map(l=>({kind:l.kind,desc:l.desc||null,hours:l.hours===''?null:+l.hours,ref:l.ref||null,amount:l.amount===''?null:+l.amount}));
    if(!lines.length){ toast('Aggiungi almeno una voce'); return; }
    const id=uid();
    state.cedolini.push({id,month,lines});
    draftLines=[]; draftMonth=null;
    save();
    reconcileCedolino(id);
  };
  document.querySelectorAll('.c-recon').forEach(b=>b.onclick=()=>reconcileCedolino(b.dataset.id));
  document.querySelectorAll('.c-del').forEach(b=>b.onclick=()=>{
    const c=state.cedolini.find(x=>x.id===b.dataset.id); if(!c) return;
    if(confirm('Eliminare questo cedolino? I servizi pagati da questo cedolino torneranno "in attesa".')){
      const restored=state.services.filter(s=>s.status==='pagato'&&s.paidIn===c.month);
      restored.forEach(s=>{ s.status='attesa'; s.paidIn=null; });
      state.cedolini=state.cedolini.filter(x=>x.id!==c.id);
      save();
      toast(restored.length?`${restored.length} servizi tornati in attesa`:'Cedolino eliminato');
      render();
    }
  });
}
function readDraft(){
  document.querySelectorAll('[data-i]').forEach(row=>{
    const i=+row.dataset.i; if(!draftLines[i]) return;
    const ks=row.querySelector('.dl-kind'),hs=row.querySelector('.dl-hours'),rs=row.querySelector('.dl-ref'),as=row.querySelector('.dl-amt');
    if(ks) draftLines[i].kind=ks.value;
    if(hs) draftLines[i].hours=hs.value;
    if(rs) draftLines[i].ref=rs.value;
    if(as) draftLines[i].amount=as.value;
  });
}

function wireInsoluto(){
  document.querySelectorAll('.eye-mini').forEach(b=>b.onclick=()=>{ toggleHiddenMonth(b.dataset.month); render(); });
  document.querySelectorAll('.t-pay').forEach( b=>b.onclick=()=>setStatus(b.dataset.id,'pagato'));
  document.querySelectorAll('.t-wait').forEach(b=>b.onclick=()=>setStatus(b.dataset.id,'attesa'));
  document.querySelectorAll('.t-del').forEach( b=>b.onclick=()=>{ state.services=state.services.filter(s=>s.id!==b.dataset.id); save(); render(); });
  document.querySelectorAll('.t-edit').forEach(b=>b.onclick=()=>editService(b.dataset.id));
  const ej=document.getElementById('exp_json'); if(ej) ej.onclick=exportJSON;
  const ec=document.getElementById('exp_csv');  if(ec) ec.onclick=exportCSV;
  const ij=document.getElementById('imp_json'); const f=document.getElementById('imp_file');
  if(ij&&f){ ij.onclick=()=>f.click(); f.onchange=importJSON; }
}

/* ═══ BACKUP ═══ */
function download(name,text,mime){ const b=new Blob([text],{type:mime}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),500); }
function exportJSON(){ download('registro_vvf_backup.json',JSON.stringify(state,null,2),'application/json'); toast('Backup scaricato'); }
function exportCSV(){
  const rows=[['Data','Tipo','Cat','Ore','Qty','Dalle','Alle','Competenza','Stato','PagatoIn','Località','Note']];
  state.services.filter(s=>s.status==='attesa').sort((a,b)=>(a.competence||'').localeCompare(b.competence||''))
    .forEach(s=>rows.push([s.date,s.type==='Altro'?(s.other||'Altro'):s.type,s.cat,s.hours||'',s.qty||'',s.startTime||'',s.endTime||'',s.competence,s.status,s.paidIn||'',s.location||'',(s.notes||'').replace(/\n/g,' ')]));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');
  download('insoluto.csv','\ufeff'+csv,'text/csv'); toast('CSV scaricato');
}
function importJSON(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d&&Array.isArray(d.services)){ state=d; save(); toast('Dati ripristinati'); render(); } else toast('File non valido'); }catch(_){ toast('File non valido'); }};
  r.readAsText(file);
}

document.querySelectorAll('#tab-bar button').forEach(b=>b.onclick=()=>{ tab=b.dataset.tab; if(tab!=='servizi') filter='attesa'; render(); });
(async()=>{ await load(); render(); if(!hasStore) toast('Anteprima: dati non persistiti'); })();
